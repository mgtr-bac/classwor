<!doctype html>
<html lang="ru">
  <head>

      rel="stylesheet"
    />
  </head>

  <body class="container">
    <h1 class="text-danger mt-4 mb-4" style="color: #dc3545 !important">

    <img

    <div class="alert alert-secondary">Человечество вырастает из детства.</div>

    </div>
