<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Выбор планеты</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="mb-4">Мое предложение: {{ planet_name }}</h1>

      <h3 class="p-2 bg-light">Эта планета близка к Земле;</h3>
      <h3 class="p-2 bg-success bg-opacity-25">
        На ней много необходимых ресурсов;
      </h3>
      <h3 class="p-2 bg-secondary bg-opacity-25 text-dark">
        На ней есть вода и атмосфера;
      </h3>
      <h3 class="p-2 bg-warning bg-opacity-25">
        На ней есть небольшое магнитное поле;
      </h3>
      <h3 class="p-2 bg-danger bg-opacity-25">Наконец, она просто красива!</h3>
    </div>
  </body>
</html>
